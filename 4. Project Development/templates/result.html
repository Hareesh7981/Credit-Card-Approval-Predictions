<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial,sans-serif;
        }

        .card{
            width:500px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
            padding:40px;
        }

        .approved{
            color:#198754;
            font-size:32px;
            font-weight:bold;
        }

        .rejected{
            color:#dc3545;
            font-size:32px;
            font-weight:bold;
        }

        .btn{
            margin-top:15px;
            width:180px;
        }
    </style>

</head>

<body>

<div class="card">

    <h2 class="mb-4">Prediction Result</h2>

    {% if prediction == "Approved" %}

        <div class="approved">
            ✅ Credit Card Approved
        </div>

    {% else %}

        <div class="rejected">
            ❌ Credit Card Rejected
        </div>

    {% endif %}

    <p class="mt-3">
        {{ message }}
    </p>

    <div class="mt-4">

        <a href="/predict" class="btn btn-primary">
            Predict Again
        </a>

        <a href="/" class="btn btn-secondary">
            Home
        </a>

    </div>

</div>

</body>
</html>
